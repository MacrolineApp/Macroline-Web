name: Bug report
description: Something is broken on macroline.app
labels: ["bug"]
body:
  - type: input
    id: page
    attributes:
      label: Which page?
      placeholder: /pricing
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: Safari 18 / iOS 18.2
