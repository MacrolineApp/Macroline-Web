<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBF3E8"/>
    </linearGradient>
  </defs>
  <!-- Bright/warm ground, matching the v1.3.1 app icon (was navy). -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Bar chart: protein / carbs / fat — flat vibrant fills read cleaner at 16px. -->
  <rect x="14" y="35" width="9" height="15" rx="4.5" fill="#F97316"/>
  <rect x="27.5" y="26" width="9" height="24" rx="4.5" fill="#EAB308"/>
  <rect x="41" y="31" width="9" height="19" rx="4.5" fill="#8B5CF6"/>
  <!-- Baseline -->
  <rect x="11" y="50" width="42" height="1.5" rx="0.75" fill="#B0A089" fill-opacity="0.5"/>
</svg>
