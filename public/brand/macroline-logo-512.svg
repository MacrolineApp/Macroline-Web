<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Macroline</title>
  <desc>Macroline brand logo — three vertical bars (protein orange, carbs amber, fat purple) on a bright warm ground.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBF3E8"/>
    </linearGradient>
    <linearGradient id="protein" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DB6513"/>
    </linearGradient>
    <linearGradient id="carbs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#CE9D07"/>
    </linearGradient>
    <linearGradient id="fat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7A51D8"/>
    </linearGradient>
  </defs>

  <!-- Square frame (matches the bright iOS app icon: ~22% corner radius, warm ground) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bar chart, scaled from the 64-unit favicon to fill the 512 canvas with
       proportional padding. Bars are 72×{height} centered at x = 112, 220, 328.
       Heights: protein 62%, carbs 100%, fat 78% of the 192-unit chart. -->
  <rect x="112" y="280" width="72" height="120" rx="36" fill="url(#protein)"/>
  <rect x="220" y="208" width="72" height="192" rx="36" fill="url(#carbs)"/>
  <rect x="328" y="248" width="72" height="152" rx="36" fill="url(#fat)"/>

  <!-- Baseline rule (subtle, warm-tinted to match the bright ground) -->
  <rect x="88" y="400" width="336" height="12" rx="6" fill="#B0A089" fill-opacity="0.5"/>
</svg>
